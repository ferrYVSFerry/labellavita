name: Deploy Next.js to GitHub Pages

on:
  # Esegue il workflow ad ogni push sul branch "main"
  push:
    branches: ["main"]
  # Permette di avviare il workflow manualmente dalla tab "Actions"
  workflow_dispatch:

# Imposta i permessi necessari per GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita esecuzioni simultanee dello stesso workflow
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Fase di Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Cambia in "yarn" o "pnpm" se usi un altro package manager

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Ripristino Cache di Next.js
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      - name: Installazione Dipendenze
        run: npm ci # Usa "yarn install --frozen-lockfile" o "pnpm install" se necessario

      - name: Build con Next.js
        run: npm run build # Assicurati che questo script generi un export statico

      - name: Upload degli artefatti
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js esporta i file statici in questa cartella di default

  # Fase di Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
